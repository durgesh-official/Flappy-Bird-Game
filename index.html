<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Ultimate</title>
    <!-- Retro Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Press Start 2P', cursive;
        }
        body {
            background-color: #333;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #70c5ce;
            /* Keeps graphics sharp */
            image-rendering: pixelated;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* --- BUTTONS --- */
        .pixel-btn {
            pointer-events: auto;
            background: #e65f2a;
            border: 4px solid #fff;
            color: white;
            padding: 15px 20px;
            font-size: 14px;
            text-transform: uppercase;
            margin: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9e3c15;
            text-shadow: 2px 2px #000;
        }
        .pixel-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #9e3c15;
        }
        .btn-green {
            background: #73bf2e;
            box-shadow: 0 6px 0 #4d851e;
        }
        .btn-green:active { box-shadow: 0 2px 0 #4d851e; }

        /* --- LOBBY --- */
        #lobby-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            pointer-events: auto;
        }
        .game-title {
            font-size: 40px;
            color: #fff;
            text-shadow: 4px 4px #000;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.5;
            animation: float 2s infinite ease-in-out;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

        /* --- ADS MODAL --- */
        #ads-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }
        .modal-box {
            background: #ded895;
            border: 4px solid #558c22;
            padding: 20px;
            width: 300px;
            text-align: center;
            position: relative;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
        }
        .plan-option {
            background: #fff; border: 2px solid #000; margin: 10px 0; padding: 10px;
            text-align: left; cursor: pointer; font-size: 12px; display: flex; align-items: center; color: #000;
        }
        .plan-option input { margin-right: 15px; transform: scale(1.5); }
        .close-btn {
            position: absolute; top: -15px; right: -10px; background: red;
            border: 2px solid white; color: white; width: 30px; height: 30px;
            font-size: 18px; cursor: pointer; line-height: 26px; text-align: center;
        }

        /* --- GAME OVER --- */
        #game-over-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            /* No background color here so we can see the frozen game behind */
        }
        .score-board {
            background: #ded895;
            border: 4px solid #558c22;
            padding: 20px;
            width: 260px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.4);
            position: relative;
        }
        .score-val { font-size: 24px; color: #fff; text-shadow: 2px 2px #000; margin-bottom: 15px; }
        .score-lbl { font-size: 14px; color: #e65f2a; margin-bottom: 5px; }
        
        /* Medal logic */
        .medal {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid #000;
            margin: 0 auto 10px auto; display: none;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.5);
        }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        
        <!-- LOBBY -->
        <div id="lobby-screen">
            <div class="game-title">FLAPPY<br>BIRD</div>
            <button class="pixel-btn btn-green" onclick="window.game.startGame()">PLAY</button>
            <button class="pixel-btn" onclick="window.game.openAdsModal()">REMOVE ADS</button>
        </div>

        <!-- ADS MODAL -->
        <div id="ads-modal">
            <div class="modal-box">
                <div class="close-btn" onclick="window.game.closeAdsModal()">X</div>
                <div style="margin-bottom: 15px; font-size: 14px; color: #e65f2a;">SELECT PLAN</div>
                <label class="plan-option"><input type="radio" name="plan" value="7days" checked> 7 Days - 50</label>
                <label class="plan-option"><input type="radio" name="plan" value="monthly"> 1 Month - 100</label>
                <label class="plan-option"><input type="radio" name="plan" value="yearly"> 1 Year - 400</label>
                <button class="pixel-btn btn-green" onclick="window.game.submitAdPlan()">CONTINUE</button>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-screen">
            <div class="game-title" style="font-size: 30px; margin-bottom: 20px;">GAME OVER</div>
            <div class="score-board">
                <!-- Medal Circle -->
                <div id="medal-display" class="medal"></div>

                <div class="score-lbl">SCORE</div>
                <div class="score-val" id="current-score">0</div>
                <div class="score-lbl">BEST</div>
                <div class="score-val" id="best-score">0</div>
            </div>
            <button class="pixel-btn" onclick="window.game.restartGame()">RESTART</button>
            <button class="pixel-btn btn-green" onclick="window.game.goToLobby()">HOME</button>
        </div>

        <!-- LIVE SCORE -->
        <div id="ingame-score" style="position: absolute; top: 10%; font-size: 50px; color: white; text-shadow: 3px 3px #000; display: none;">0</div>
    </div>

<script>
    window.game = {};

    const cvs = document.getElementById("gameCanvas");
    const ctx = cvs.getContext("2d");

    // UI Variables
    const uiLobby = document.getElementById("lobby-screen");
    const uiModal = document.getElementById("ads-modal");
    const uiGameOver = document.getElementById("game-over-screen");
    const uiScore = document.getElementById("ingame-score");
    const txtCurrent = document.getElementById("current-score");
    const txtBest = document.getElementById("best-score");
    const medalDiv = document.getElementById("medal-display");

    let frames = 0;
    
    // States: 0=Lobby, 1=Game, 2=Falling(Hit pipe), 3=Ground(Show UI)
    const STATE = { LOBBY: 0, GAME: 1, FALLING: 2, OVER: 3 };
    let currentState = STATE.LOBBY;

    function resize() {
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- AUDIO ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();
    function playTone(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'flap') {
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'score') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(1000, now);
            gain.gain.setValueAtTime(0.1, now);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'die') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, now);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        }
    }

    // --- OBJECTS ---
    const score = {
        best: parseInt(localStorage.getItem("flappy_best")) || 0,
        value: 0
    };

    const bird = {
        x: 60, y: 150, radius: 13,
        velocity: 0, gravity: 0.25, jump: -5.5, rotation: 0,
        
        draw: function() {
            ctx.save();
            ctx.translate(this.x, this.y);
            // Rotation logic
            if (currentState === STATE.GAME || currentState === STATE.FALLING) {
                if(this.velocity < this.jump/2) this.rotation = -0.3;
                else if(this.velocity > 0) {
                    this.rotation += 0.04;
                    if(this.rotation > 1.5) this.rotation = 1.5;
                } else {
                    this.rotation = 0;
                }
            } else {
                this.rotation = 0;
            }
            ctx.rotate(this.rotation);

            // Bird Body
            ctx.fillStyle = "#ffcc00";
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = "#000"; ctx.stroke();
            
            // Eye
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(6, -6, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(8, -6, 2, 0, Math.PI*2); ctx.fill();
            // Beak
            ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.arc(8, 4, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // Wing
            ctx.fillStyle = "#fff"; 
            let wingY = (currentState === STATE.LOBBY || (currentState === STATE.GAME && frames % 10 < 5)) ? -2 : 2;
            ctx.beginPath(); ctx.ellipse(-5, wingY, 8, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

            ctx.restore();
        },
        update: function() {
            if (currentState === STATE.LOBBY) {
                this.y = cvs.height/2 - 50 + Math.sin(frames/15) * 10;
                this.velocity = 0;
                this.rotation = 0;
            } 
            else if (currentState === STATE.GAME || currentState === STATE.FALLING) {
                this.velocity += this.gravity;
                this.y += this.velocity;

                // Ground Hit
                if (this.y + this.radius >= cvs.height - ground.h) {
                    this.y = cvs.height - ground.h - this.radius;
                    if(currentState !== STATE.OVER) {
                        showGameOverUI();
                    }
                }
            }
        },
        flap: function() {
            this.velocity = this.jump;
            this.rotation = -0.3;
            playTone('flap');
        }
    };

    const pipes = {
        items: [], w: 60, gap: 150, dx: 3,
        
        draw: function() {
            for(let i=0; i<this.items.length; i++) {
                let p = this.items[i];
                let bottomY = p.y + this.gap;
                
                // Top Pipe
                this.drawOnePipe(p.x, 0, this.w, p.y, true);
                // Bottom Pipe
                this.drawOnePipe(p.x, bottomY, this.w, cvs.height - ground.h - bottomY, false);
            }
        },

        // Detailed Pipe Drawing (User Preference)
        drawOnePipe: function(x, y, w, h, isTop) {
            ctx.fillStyle = "#73bf2e"; // Main Green
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = "#558c22"; // Border Color
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);

            // Highlight
            ctx.fillStyle = "#9ce659";
            ctx.fillRect(x + 2, y, 10, h);
            
            // Pipe Cap
            let capH = 25;
            let capY = isTop ? y + h - capH : y;
            ctx.fillStyle = "#73bf2e";
            ctx.fillRect(x - 3, capY, w + 6, capH);
            ctx.strokeRect(x - 3, capY, w + 6, capH);
            // Cap Highlight
            ctx.fillStyle = "#9ce659";
            ctx.fillRect(x, capY + 2, 10, capH - 4);
        },

        update: function() {
            // STOP updating pipes if Falling or Over
            if(currentState === STATE.FALLING || currentState === STATE.OVER) return;

            // Generate
            if(frames % 110 === 0) {
                let yPos = Math.random() * (cvs.height - ground.h - this.gap - 100) + 50;
                if(currentState === STATE.LOBBY) yPos = cvs.height/2 - 75;
                this.items.push({ x: cvs.width, y: yPos, passed: false });
            }

            // Move & Collide
            for(let i=0; i<this.items.length; i++) {
                let p = this.items[i];
                p.x -= this.dx;

                // Collision
                if (currentState === STATE.GAME) {
                    if(bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + this.w) {
                        if(bird.y - bird.radius < p.y || bird.y + bird.radius > p.y + this.gap) {
                            hitPipe();
                        }
                    }
                    // Score
                    if(p.x + this.w < bird.x && !p.passed) {
                        score.value++;
                        uiScore.innerText = score.value;
                        p.passed = true;
                        playTone('score');
                    }
                }
                
                // Remove
                if(p.x + this.w <= -10) {
                    this.items.shift();
                    i--;
                }
            }
        },
        reset: function() { this.items = []; }
    };

    const ground = {
        h: 110, x: 0, dx: 3,
        draw: function() {
            // Main Ground
            ctx.fillStyle = "#ded895"; 
            ctx.fillRect(0, cvs.height - this.h, cvs.width, this.h);
            
            // Grass Top
            ctx.fillStyle = "#73bf2e"; 
            ctx.fillRect(0, cvs.height - this.h, cvs.width, 15);
            ctx.strokeStyle = "#558c22";
            ctx.beginPath(); ctx.moveTo(0, cvs.height - this.h + 15); ctx.lineTo(cvs.width, cvs.height - this.h + 15); ctx.stroke();

            // Diagonal Lines (Retro Look)
            ctx.strokeStyle = "#cbb968";
            ctx.lineWidth = 3;
            for(let i=0; i<cvs.width/20 + 5; i++) {
                let xPos = (this.x + i * 30) % (cvs.width + 30) - 30;
                ctx.beginPath(); 
                ctx.moveTo(xPos, cvs.height - this.h + 18); 
                ctx.lineTo(xPos - 15, cvs.height); 
                ctx.stroke();
            }
            
            // Top Border
            ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
            ctx.strokeRect(0, cvs.height - this.h, cvs.width, this.h);
        },
        update: function() {
            if(currentState === STATE.GAME || currentState === STATE.LOBBY) {
                this.x = (this.x - this.dx) % 30;
            }
            // If Falling or Over, Ground stops moving (x doesn't change)
        }
    };

    // --- GAME LOGIC ---

    function loop() {
        // Draw Background
        ctx.fillStyle = "#70c5ce"; ctx.fillRect(0,0, cvs.width, cvs.height);
        
        // Draw Clouds (Static or slow moving)
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.beginPath(); ctx.arc(100, 100, 30, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cvs.width-100, 150, 40, 0, Math.PI*2); ctx.fill();

        // Update & Draw
        // Order: Background -> Pipes -> Ground -> Bird -> UI
        pipes.update(); 
        pipes.draw();
        
        ground.update(); 
        ground.draw();
        
        bird.update(); 
        bird.draw();

        frames++;
        requestAnimationFrame(loop);
    }

    // HIT LOGIC: Pipe Collision -> Stop Scrolling -> Bird Falls -> Ground Hit -> Show UI
    function hitPipe() {
        currentState = STATE.FALLING; // Pipes/Ground stop moving
        playTone('hit');
        // Bird continues to update() so it falls due to gravity
    }

    function showGameOverUI() {
        currentState = STATE.OVER;
        playTone('die');
        
        // Save Score
        if(score.value > score.best) {
            score.best = score.value;
            localStorage.setItem("flappy_best", score.best);
        }

        uiScore.style.display = 'none';
        uiGameOver.style.display = 'flex';
        txtCurrent.innerText = score.value;
        txtBest.innerText = score.best;

        // Medals
        medalDiv.style.display = 'block';
        if(score.value >= 40) medalDiv.style.background = "#ffd700"; // Gold
        else if(score.value >= 20) medalDiv.style.background = "#c0c0c0"; // Silver
        else if(score.value >= 10) medalDiv.style.background = "#cd7f32"; // Bronze
        else medalDiv.style.display = 'none'; // No Medal
    }

    // BUTTON FUNCTIONS
    window.game.startGame = function() {
        pipes.reset();
        score.value = 0;
        uiScore.innerText = "0";
        currentState = STATE.GAME;
        uiLobby.style.display = 'none';
        uiGameOver.style.display = 'none';
        uiScore.style.display = 'block';
        bird.y = 150;
        bird.velocity = 0;
        bird.flap();
    };

    window.game.openAdsModal = function() { uiModal.style.display = 'flex'; };
    window.game.closeAdsModal = function() { uiModal.style.display = 'none'; };
    window.game.submitAdPlan = function() { 
        alert("Plan Selected. Integrating Payment Gateway..."); 
        uiModal.style.display = 'none';
    };

    window.game.restartGame = function() {
        window.game.startGame();
    };

    window.game.goToLobby = function() {
        currentState = STATE.LOBBY;
        uiGameOver.style.display = 'none';
        uiLobby.style.display = 'flex';
        pipes.reset();
        bird.y = cvs.height / 2;
    };

    // INPUT HANDLING
    function handleTap(e) {
        // Prevent Tap if clicking UI Buttons
        if (e.target.closest('button') || e.target.closest('input') || e.target.closest('label') || e.target.closest('.modal-box')) return;
        
        if (currentState === STATE.GAME) {
            e.preventDefault(); 
            bird.flap();
        }
    }

    window.addEventListener('mousedown', handleTap);
    window.addEventListener('touchstart', handleTap, {passive: false});
    window.addEventListener('keydown', e => {
        if(e.code === 'Space' && currentState === STATE.GAME) bird.flap();
    });

    loop();

</script>
</body>
</html>
